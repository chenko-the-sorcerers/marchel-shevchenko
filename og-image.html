<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>OG Image Generator</title>
  <style>
    body { background:#111; display:flex; flex-direction:column; align-items:center; padding:2rem; font-family:monospace; color:#00ff41; }
    canvas { border:1px solid #0d3318; margin:1rem 0; max-width:100%; }
    button { background:#00ff41; color:#020905; border:none; padding:0.6rem 1.4rem; font-family:monospace; font-size:0.9rem; cursor:pointer; margin:0.5rem; }
    p { font-size:0.8rem; color:#3d8048; }
  </style>
  <script src="components/terminal.js" defer></script>
</head>
<body>
  <h2 style="font-size:0.9rem;letter-spacing:0.1em;">OG IMAGE GENERATOR</h2>
  <canvas id="c" width="1200" height="630"></canvas>
  <div>
    <button onclick="generate()">REGENERATE</button>
    <button onclick="download()">DOWNLOAD PNG</button>
  </div>
  <p>Save as <strong>og-image.png</strong> in root folder</p>

  <script>
  const canvas = document.getElementById('c');
  const ctx    = canvas.getContext('2d');
  const W = 1200, H = 630;

  function generate() {
    // Background
    ctx.fillStyle = '#020905';
    ctx.fillRect(0, 0, W, H);

    // Grid lines
    ctx.strokeStyle = 'rgba(0,255,65,0.04)';
    ctx.lineWidth = 1;
    for (let x = 0; x < W; x += 60) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
    for (let y = 0; y < H; y += 60) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }

    // Scanlines
    for (let y = 0; y < H; y += 4) {
      ctx.fillStyle = 'rgba(0,0,0,0.12)';
      ctx.fillRect(0, y, W, 2);
    }

    // Glow orb top-right
    const grd = ctx.createRadialGradient(950, 120, 0, 950, 120, 300);
    grd.addColorStop(0, 'rgba(0,255,65,0.12)');
    grd.addColorStop(1, 'rgba(0,255,65,0)');
    ctx.fillStyle = grd;
    ctx.fillRect(0, 0, W, H);

    // Border
    ctx.strokeStyle = '#155a28';
    ctx.lineWidth = 2;
    ctx.strokeRect(1, 1, W-2, H-2);

    // Inner border
    ctx.strokeStyle = 'rgba(0,255,65,0.15)';
    ctx.lineWidth = 1;
    ctx.strokeRect(20, 20, W-40, H-40);

    // Top bar
    ctx.fillStyle = 'rgba(0,255,65,0.05)';
    ctx.fillRect(20, 20, W-40, 48);

    // Window dots
    [[40,'#ff5f57'],[62,'#febc2e'],[84,'#28c840']].forEach(([x,c]) => {
      ctx.beginPath(); ctx.arc(x, 44, 7, 0, Math.PI*2);
      ctx.fillStyle = c; ctx.fill();
    });

    // Title bar text
    ctx.fillStyle = 'rgba(0,255,65,0.4)';
    ctx.font = '14px monospace';
    ctx.fillText('marchel@sys:~/portfolio $ ./init_portfolio.sh', 110, 49);

    // SYS:// badge
    ctx.font = 'bold 13px monospace';
    ctx.fillStyle = '#00ff41';
    ctx.fillText('SYS://MARCHEL', 56, 110);

    // Main name
    ctx.font = 'bold 80px monospace';
    const grad = ctx.createLinearGradient(56, 130, 700, 220);
    grad.addColorStop(0, '#00ff41');
    grad.addColorStop(1, '#00a82b');
    ctx.fillStyle = grad;
    ctx.fillText('MARCHEL', 56, 210);
    ctx.fillText('SHEVCHENKO', 56, 300);

    // Title
    ctx.font = '22px monospace';
    ctx.fillStyle = '#ffb300';
    ctx.fillText('AI ARCHITECT & BUILDER', 56, 350);

    // Tags
    const tags = ['MULTIMODAL AI', 'INDONESIAN NLP', 'FOUNDATION MODELS', 'MIT Pre-PhD', 'NVIDIA INCEPTION'];
    let tx = 56;
    tags.forEach(tag => {
      const tw = ctx.measureText(tag).width + 20;
      ctx.fillStyle = 'rgba(0,255,65,0.08)';
      ctx.strokeStyle = '#155a28';
      ctx.lineWidth = 1;
      ctx.fillRect(tx, 375, tw, 28);
      ctx.strokeRect(tx, 375, tw, 28);
      ctx.font = '12px monospace';
      ctx.fillStyle = '#00ff41';
      ctx.fillText(tag, tx+10, 393);
      tx += tw + 10;
    });

    // Stats
    const stats = [['20+','PROJECTS'],['40+','TALKS'],['600K+','USERS'],['$362K+','NVIDIA GRANTS']];
    stats.forEach(([val,lbl], i) => {
      const sx = 56 + i * 270;
      ctx.font = 'bold 36px monospace';
      ctx.fillStyle = '#ffb300';
      ctx.fillText(val, sx, 490);
      ctx.font = '12px monospace';
      ctx.fillStyle = 'rgba(0,255,65,0.5)';
      ctx.fillText(lbl, sx, 510);
    });

    // Bottom bar
    ctx.fillStyle = 'rgba(0,255,65,0.04)';
    ctx.fillRect(20, H-68, W-40, 48);
    ctx.font = '13px monospace';
    ctx.fillStyle = 'rgba(0,255,65,0.35)';
    ctx.fillText('marchel-shevchenko.vercel.app', 56, H-38);
    ctx.fillStyle = 'rgba(0,255,65,0.2)';
    ctx.fillText('[AI FOR CULTURE · LANGUAGE · THE FUTURE OF INDONESIA]', 400, H-38);

    // Particle dots (decorative)
    for (let i = 0; i < 40; i++) {
      const x = 820 + Math.random() * 340;
      const y = 80 + Math.random() * 480;
      const r = 1 + Math.random() * 3;
      const a = 0.1 + Math.random() * 0.4;
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI*2);
      ctx.fillStyle = `rgba(0,255,65,${a})`;
      ctx.fill();
    }
  }

  function download() {
    const a = document.createElement('a');
    a.download = 'og-image.png';
    a.href = canvas.toDataURL('image/png');
    a.click();
  }

  generate();
  </script>
</body>
</html>

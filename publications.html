<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Publications & Research — Marchel Shevchenko</title>
  <meta name="description" content="Research papers, conference presentations, and publications by Marchel Shevchenko in AI, NLP, Computer Vision, and Bioinformatics." />
  <meta name="author" content="Marchel Andrian Shevchenko" />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://marchel-shevchenko.vercel.app/publications" />
  <meta property="og:title" content="Publications & Research — Marchel Shevchenko" />
  <meta property="og:description" content="Research papers and conference presentations in AI, NLP, Computer Vision, and Bioinformatics." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' fill='%23020905'/><text x='50%' y='55%' dominant-baseline='middle' text-anchor='middle' font-size='20' fill='%2300ff41'>M</text></svg>" />
  <link rel="stylesheet" href="styles/globals.css" />
  <script src="lib/cv-data.js" defer></script>
  <script src="components/crt.js" defer></script>
  <script src="components/sound.js" defer></script>
  <script src="components/navbar.js" defer></script>
  <script src="components/footer.js" defer></script>
  <script src="pages/publications.js" defer></script>
  <style>
    .pub-grid { display: flex; flex-direction: column; gap: 1.1rem; }

    .pub-card {
      background: var(--panel);
      border: 1px solid var(--border-hi);
      padding: 0;
      transition: border-color 0.2s, box-shadow 0.2s;
      position: relative; overflow: hidden;
    }
    .pub-card:hover {
      border-color: var(--green);
      box-shadow: 0 0 20px rgba(0,255,65,0.08);
    }
    .pub-card::before {
      content: ''; position: absolute;
      left: 0; top: 0; bottom: 0; width: 3px;
      background: var(--green); opacity: 0;
      transition: opacity 0.2s;
    }
    .pub-card:hover::before { opacity: 1; }

    .pub-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.55rem 1rem;
      border-bottom: 1px solid var(--border);
      background: rgba(0,255,65,0.02);
      flex-wrap: wrap; gap: 0.4rem;
    }
    .pub-type {
      font-family: var(--font-pixel); font-size: 0.44rem;
      padding: 0.2rem 0.5rem; border: 1px solid;
      letter-spacing: 0.05em;
    }
    .pub-type.conference { color: var(--green);  border-color: var(--green-dark); }
    .pub-type.journal    { color: var(--amber);  border-color: var(--amber-dim); }
    .pub-type.workshop   { color: var(--cyan);   border-color: var(--cyan-dim); }
    .pub-type.thesis     { color: #cc88ff;       border-color: rgba(200,100,255,0.4); }

    .pub-year {
      font-family: var(--font-vt); font-size: 1rem;
      color: var(--amber); text-shadow: var(--glow-a);
    }
    .pub-body { padding: 1rem 1.2rem; }
    .pub-title {
      font-size: 0.92rem; color: var(--text-bright);
      line-height: 1.6; margin-bottom: 0.5rem;
      font-weight: normal;
    }
    .pub-title:hover { color: var(--green); cursor: default; }

    .pub-authors { font-size: 0.78rem; color: var(--text-dim); margin-bottom: 0.3rem; }
    .pub-authors .me { color: var(--green); }

    .pub-venue {
      font-size: 0.78rem; color: var(--cyan);
      font-style: italic; margin-bottom: 0.7rem;
    }
    .pub-tags { display: flex; flex-wrap: wrap; gap: 0.3rem; }

    /* Filter */
    .pub-filter {
      display: flex; gap: 0.4rem; flex-wrap: wrap;
      margin-bottom: 1.5rem;
    }

    /* Stats row */
    .pub-stats {
      display: flex; gap: 2rem; flex-wrap: wrap;
      margin-bottom: 2rem; padding: 1rem 1.2rem;
      background: var(--panel); border: 1px solid var(--border-hi);
    }
    .ps-item { text-align: center; }
    .ps-num { font-family: var(--font-vt); font-size: 2rem; color: var(--amber); text-shadow: var(--glow-a); }
    .ps-lbl { font-size: 0.72rem; color: var(--text-dim); }
  </style>
  <script src="components/terminal.js" defer></script>
  <script src="components/wayang.js" defer></script>
</head>
<body>
  <div class="page-wrap">
    <div class="section-header reveal">
      <span class="sh-prompt">marchel@sys:~$</span>
      <span class="sh-cmd">cat ./publications.bib</span>
      <span class="sh-args">--sort=year</span>
    </div>

    <div class="pub-stats reveal">
      <div class="ps-item"><div class="ps-num" id="ps-total">0</div><div class="ps-lbl">PUBLICATIONS</div></div>
      <div class="ps-item"><div class="ps-num" id="ps-conf">0</div><div class="ps-lbl">CONFERENCES</div></div>
      <div class="ps-item"><div class="ps-num" id="ps-intl">0</div><div class="ps-lbl">INTERNATIONAL</div></div>
      <div class="ps-item"><div class="ps-num" id="ps-years">0</div><div class="ps-lbl">YEARS ACTIVE</div></div>
    </div>

    <div class="pub-filter reveal" id="pub-filter">
      <span class="label" style="align-self:center;font-size:0.78rem;">FILTER:</span>
    </div>

    <div class="pub-grid reveal" id="pub-grid"></div>
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Projects — Marchel Shevchenko</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' fill='%23020905'/><text x='50%' y='55%' dominant-baseline='middle' text-anchor='middle' font-size='20' fill='%2300ff41'>M</text></svg>" />
  <link rel="stylesheet" href="styles/globals.css" />
  <script src="lib/cv-data.js" defer></script>
  <script src="components/crt.js" defer></script>
  <script src="components/navbar.js" defer></script>
  <script src="components/footer.js" defer></script>
  <script src="pages/projects.js" defer></script>
  <style>
    .filter-bar {
      display: flex; flex-wrap: wrap; gap: 0.4rem;
      margin-bottom: 1.8rem; align-items: center;
    }
    .filter-label { color: var(--text-dim); font-size: 0.78rem; margin-right: 0.3rem; }
    .filter-btn {
      font-family: var(--font-mono); font-size: 0.75rem;
      padding: 0.25rem 0.7rem;
      border: 1px solid var(--border-hi); background: transparent;
      color: var(--text-dim); cursor: none;
      transition: all var(--transition);
    }
    .filter-btn:hover { color: var(--green); border-color: var(--green); }
    .filter-btn.active { color: var(--bg); background: var(--green); border-color: var(--green); }

    .projects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1.1rem;
    }
    .proj-card {
      background: var(--panel);
      border: 1px solid var(--border-hi);
      transition: all 0.25s; cursor: default;
      position: relative; overflow: hidden;
    }
    .proj-card::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(0,255,65,0.05) 0%, transparent 60%);
      opacity: 0; transition: opacity 0.25s;
    }
    .proj-card:hover { border-color: var(--green); transform: translateY(-3px); box-shadow: 0 8px 28px rgba(0,255,65,0.12), 4px 4px 0 var(--green-dark); }
    .proj-card:hover::after { opacity: 1; }
    .proj-card.hidden { display: none; }

    .proj-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.5rem 1rem;
      border-bottom: 1px solid var(--border);
      background: rgba(0,255,65,0.02);
    }
    .proj-num { font-size: 0.7rem; color: var(--text-dim); font-family: var(--font-mono); }
    .proj-body { padding: 1rem; }
    .proj-title {
      font-family: var(--font-vt); font-size: 1.3rem;
      color: var(--text-bright); margin-bottom: 0.4rem;
      transition: text-shadow 0.2s;
    }
    .proj-card:hover .proj-title { text-shadow: var(--glow-g); }
    .proj-desc { font-size: 0.82rem; color: var(--text-dim); line-height: 1.75; margin-bottom: 0.75rem; }
    .proj-stack { display: flex; flex-wrap: wrap; gap: 0.3rem; }
    .proj-footer {
      font-size: 0.7rem; color: var(--text-dim);
      margin-top: 0.65rem; padding-top: 0.5rem;
      border-top: 1px solid var(--border);
    }
    .proj-footer .event { color: var(--amber); }

    .count-info { font-size: 0.78rem; color: var(--text-dim); margin-bottom: 1rem; }
    .count-info span { color: var(--green); }
  </style>
</head>
<body>
  <div class="page-wrap">
    <div class="section-header reveal">
      <span class="sh-prompt">marchel@sys:~$</span>
      <span class="sh-cmd">ls -la ./projects/</span>
      <span class="sh-args">--all --sort=year</span>
    </div>

    <div class="filter-bar reveal">
      <span class="filter-label">FILTER:</span>
      <button class="filter-btn active" data-tag="ALL">ALL</button>
      <button class="filter-btn" data-tag="NLP">NLP</button>
      <button class="filter-btn" data-tag="LLM">LLM</button>
      <button class="filter-btn" data-tag="CV">CV</button>
      <button class="filter-btn" data-tag="App">APP</button>
      <button class="filter-btn" data-tag="Web3">WEB3</button>
      <button class="filter-btn" data-tag="Audio">AUDIO</button>
      <button class="filter-btn" data-tag="Sys">SYS</button>
      <button class="filter-btn" data-tag="ML">ML</button>
      <button class="filter-btn" data-tag="Data">DATA</button>
    </div>

    <div class="count-info reveal">SHOWING <span id="proj-count">0</span> PROJECTS</div>
    <div class="projects-grid" id="projects-grid"></div>
  </div>
</body>
</html>
